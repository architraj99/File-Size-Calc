<!DOCTYPE html>
<html>
<head>
    <title>File Size Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>File Size Calculator</h1>
    <p>Convert Data Units/ Storage Space Of A File</p>

    <div>
        <h2>Unit Converter</h2>

        <input type="number" id="value" placeholder="Enter size">

        <select id="unit">
            <option value="KB">KB</option>
            <option value="MB">MB</option>
            <option value="GB">GB</option>
            <option value="TB">TB</option>
        </select>

        <button onclick="convert()">Convert</button>
    </div>

    <div>
        <h2>Check File Size</h2>
        <input type="file" id="fileInput" multiple>
        <button onclick="checkFiles()">Check Files</button>
    </div>

    <div>
        <h2>Result</h2>
        <p id="result"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
